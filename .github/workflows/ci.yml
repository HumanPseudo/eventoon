name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install deps
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src
      - name: Ruff format
        run: uv run ruff format --check src

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventoon
          POSTGRES_PASSWORD: eventoon
          POSTGRES_DB: eventoon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U eventoon
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install deps
        run: uv sync
      - name: Run API tests
        run: uv run pytest -v
        env:
          DATABASE_URL: postgresql+asyncpg://eventoon:eventoon@localhost:5432/eventoon
          TEST_DATABASE_URL: postgresql+asyncpg://eventoon:eventoon@localhost:5432/eventoon

  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventoon
          POSTGRES_PASSWORD: eventoon
          POSTGRES_DB: eventoon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U eventoon
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: >-
          --health-cmd "/opt/bin/check-docker.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend deps
        run: uv sync
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Start backend
        run: |
          DATABASE_URL=postgresql+asyncpg://eventoon:eventoon@localhost:5432/eventoon \
          uv run uvicorn eventoon.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl --retry 5 --retry-delay 2 --fail http://localhost:8000/health
      - name: Build & serve frontend
        working-directory: frontend
        run: |
          VITE_API_URL=http://localhost:8000 npm run build
          npx serve dist -l 5173 &
          sleep 2
      - name: Run E2E tests
        run: uv run pytest tests/test_selenium.py -v
        env:
          SELENIUM_URL: http://localhost:4444/wd/hub
          FRONTEND_URL: http://localhost:5173
          DATABASE_URL: postgresql+asyncpg://eventoon:eventoon@localhost:5432/eventoon
          TEST_DATABASE_URL: postgresql+asyncpg://eventoon:eventoon@localhost:5432/eventoon

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
